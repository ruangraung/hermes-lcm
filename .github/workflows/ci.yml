name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7

      - name: Lint GitHub Actions workflows
        run: |
          "$(go env GOPATH)"/bin/actionlint

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff==0.15.13

      - name: Lint with ruff
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: pip install pytest

      - name: Stub hermes-agent ABC
        run: |
          mkdir -p agent
          cat > agent/__init__.py <<'STUB'
          STUB
          cat > agent/context_engine.py <<'STUB'
          """Minimal stub of hermes-agent ContextEngine ABC for CI."""
          class ContextEngine:
              """Base class stub — just enough for LCMEngine to import."""
              def __init__(self, **kwargs):
                  self.compression_count = 0
                  self.last_prompt_tokens = 0
              def compress(self, messages, current_tokens=None, **kwargs):
                  raise NotImplementedError
              def on_session_start(self, session_id, **kwargs):
                  pass
              def on_session_end(self, **kwargs):
                  pass
              def on_session_reset(self):
                  self.compression_count = 0
                  self.last_prompt_tokens = 0
              def get_tool_schemas(self):
                  return []
              def handle_tool_call(self, name, args, **kwargs):
                  raise NotImplementedError
              def get_status(self):
                  return {}
          STUB

      - name: Run pytest under low file descriptor limit
        run: |
          ulimit -n 1024
          python -m pytest tests/ -q

      - name: Run static validation
        run: |
          python -m compileall -q .
          python -m py_compile scripts/import_lossless_claw.py
          bash -n scripts/install.sh scripts/update.sh
          git diff --check
